<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, inicial-scale=1">
    <title>Projeto form</title>

    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">


</head>

<body>
    <header>
        <h1>Projeto</h1>
    </header>
    <main>
        <div class="container">
            <form>
                <div class="mb-3">
                    <label for="nomeProjeto" class="form-label">Nome do Projeto</label>
                    <input type="email" class="form-control" id="nomeProjeto" aria-describedby="emailHelp">
                </div>

                <div class="mb-3">
                    <label for="descricaoProjeto" class="form-label">Descrição do Projeto</label>
                    <textarea class="form-control" id="descricaoProjeto" rows="3"
                        placeholder="Digite a descrição do projeto"></textarea>
                </div>
                <div class="form-group">
                    <label for="dtCriacaoProjeto">Data Inicial</label>
                    <input type="date" class="form-control" id="dtCriacaoProjeto">
                    <label for="dtConclusaoProjeto">Data Conclusão</label>
                    <input type="date" class="form-control" id="dtConclusaoProjeto">
                </div>
                <label for="statusProjeto">Status</label><br>
                <select class="form-select" aria-label="Default select example">
                    <option selected>Selecione</option>
                    <option value="ATIVO">Ativo</option>
                    <option value="CONCLUIDO">Concluído</option>
                    <option value="CANCELADO">Cancelado</option>
                </select>
                <div class="mb-3">
                    <label for="responsavelIdProjeto" class="form-label">Responsável</label>
                    <input type="email" class="form-control" id="responsavelIdProjeto" aria-describedby="emailHelp">
                </div>
                <button type="submit" class="btn btn-primary">Criar</button>



            </form>
        </div>
