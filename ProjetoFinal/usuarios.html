<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="layout">
        <div class="barraLateral">
            <span class="logo">
                <a href="index.html"><img src="img/logo.png" alt=""></a>
            </span>
            <hr style="background-color: white; border: none;height: 2px;">
            <aside class="menu">
                <ul>
                    <li><a class=" menuItem" href="index.html">Dashboard</a></li>
                    <li><a class="menuItem" href="tarefas.html">Tarefas</a></li>
                    <li><a class="menuItem" href="projetos.html">Projetos</a></li>
                    <li><a class="menuItem active" href="usuarios.html">Usuarios</a></li>
                </ul>
            </aside>
            <div class="btSair">
                <a href="#" class="menuItem btSair">Sair</a>
            </div>
        </div>
        <div class="geral">
            <div class="barraSuperior">
                <nav class="menuSuperior">
                    <div class="userPerfil card shadow">
                        <img src="img/avatar.jpg" alt="" class="rounded-circle" width="40">
                        <b>Victor</b>
                    </div>
                </nav>
                <div class="barraTitulo text-white fw-bold">
                    <h2>Usuários</h2>
                </div>
            </div>
            <div class="corpo">

                <div class="container" style="max-width: 620px;">

                    <h2 class="text-black fw-bold mb-4">Adicionar Novo Usuário</h2>

                    <div class="card shadow">
                        <div class="card-body p-4">
                            <form id="formUsuario">

                                <!-- Botão Lista de Usuários -->
                                <div class="d-flex justify-content-end mb-3">
                                    <button type="button" class="btn btn-success">Lista de Usuários</button>
                                </div>

                                <!-- Nome -->
                                <div class="mb-3">
                                    <label for="nomeUsuario" class="form-label fw-semibold">Nome: <span
                                            class="text-danger">*</span></label>
                                    <input type="text" id="nomeUsuario" name="nomeUsuario" class="form-control"
                                        placeholder="Digite o nome" />
                                </div>

                                <!-- CPF -->
                                <div class="mb-3">
                                    <label for="cpfUsuario" class="form-label fw-semibold">CPF: <span
                                            class="text-danger">*</span></label>
                                    <input type="text" id="cpfUsuario" name="cpfUsuario" class="form-control"
                                        placeholder="000.000.000-00" maxlength="14" inputmode="numeric" />
                                </div>

                                <!-- E-mail -->
                                <div class="mb-3">
                                    <label for="emailUsuario" class="form-label fw-semibold">E-mail: <span
                                            class="text-danger">*</span></label>
                                    <input type="email" id="emailUsuario" name="emailUsuario" class="form-control"
                                        placeholder="email@email.com" />
                                </div>

                                <!-- Data de Nascimento -->
                                <div class="mb-3">
                                    <label for="dataNascimento" class="form-label fw-semibold">Data de Nascimento: <span
                                            class="text-danger">*</span></label>
                                    <input type="date" id="dataNascimento" name="dataNascimento" class="form-control" />
                                </div>

                                <!-- Status -->
                                <div class="mb-3">
                                    <label for="statusUsuario" class="form-label fw-semibold">Status: <span
                                            class="text-danger">*</span></label>
                                    <select id="statusUsuario" name="statusUsuario" class="form-select">
                                        <option value="" disabled selected>Selecione o status</option>
                                        <option value="ATIVO">Ativo</option>
                                        <option value="INATIVO">Inativo</option>
                                        <option value="BLOQUEADO">Bloqueado</option>
                                    </select>
                                </div>

                                <!-- Senha Temporária -->
                                <div class="mb-4">
                                    <label for="senhaUsuario" class="form-label fw-semibold">Senha Temporária: <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="password" id="senhaUsuario" name="senhaUsuario" class="form-control"
                                            placeholder="Digite a senha" />
                                        <button class="btn btn-outline-secondary" type="button"
                                            id="toggleSenha">Mostrar</button>
                                    </div>
                                </div>

                                <!-- Botões -->
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-success btn-lg" onclick="validarFormUsuario()">Adicionar Usuário</button>
                                    <button type="button" class="btn btn-outline-danger btn-lg">Cancelar</button>
                                </div>

                            </form>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="js/bootstrap.js"></script>
    <script src="js/script.js"></script>
</body>
