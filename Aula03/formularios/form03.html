<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Tarefa form</title>
</head>

<body>
    <header>
        <h1>Tarefa</h1>
    </header>
    <main>
        <form action="">

            <label for="titulo"><b>Titulo:</b></label><br>
            <input type="text" id="titulo" name="titulo"><br>

            <label for="descricao">Descrição:</label><br>
            <textarea name="descricao" id="descricao" placeholder="Digite a descrição ta tarefa."
                style="width: 300px; height: 100px;"></textarea><br>

            <label for="dataCriacao"><b>Data Inicial:</b></label><br>
            <input type="date" name="dataCriacao" id="dataCriacao"><br>

            <label for="dataConclusao"><b>Data Conclusao:</b></label><br>
            <input type="date" name="dataConclusao" id="dataConclusao"><br>

            <label for="prioridade"><b>Prioridade da tarefa:</b></label><br>
            <select name="prioridade" id="prioridade">
                <option value="BAIXA">Baixa</option>
                <option value="MEDIA">Média</option>
                <option value="ALTA">Alta</option>
            </select><br>
            <label for="projetoId"><b>Projeto ID:</b></label><br>
            <input type="number" name="projetoId" id="projetoId"><br>
            <label for="usuarioId"><b>Usuário ID:</b></label><br>
            <input type="number" name="usuarioId" id="usuarioId"><br><br>

            <input type="reset">
            <button type="button" onclick="alert('Tarefa criada com sucesso!')">Enviar</button>
            <input type="submit">
        </form>
    </main>
    <footer></footer>
</body>
<footer>

</footer>

</html>
